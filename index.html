<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js" integrity="sha512-hUhvpC5f8cgc04OZb55j0KNGh4eh7dLxd/dPSJ5VyzqDWxsayYbojWyl5Tkcgrmb/RVKCRJI1jNlRbVP4WWC4w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone.min.js" integrity="sha512-WHGbuvJ5ZKdxYDXBD+JozxVP7nbimtB8XUsJ6PFfXLt/yaMOQzegjjyPY6U2rWP9+fgJm5b6Re7mWL3+ZLioRQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>World clock - Gladys Monnapule</title>
  </head>

  <body>
    <div class="containers">
      <h1>World Clock</h1>

      <select class="city-wrapper">
        <option value="">Select a city...</option>
        <option value="Europe/London">London</option>
        <option value="Australia/Sydney">Sydney</option>
        <option value="Africa/Harare">Zimbabwe</option>
        <option value="Africa/Johannesburg">Kimberley</option>
      </select>
    
      <div class="cities-wrapper">
      <div class="city" id="london">
        <h2>London</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
      </div>

      <div class="city" id="sydney">
        <h2>Sydney</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
      </div>
        <div class="city" id="zimbabwe">
        <h2>Zimbabwe</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
        </div>
        <div class="city" id="kimberley">
        <h2>Kimberley</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
      </div>
      </div>
    <footer>
      This project was created by Gladys Monnapule and is
      <a href="https://github.com/Gladys050/world-clock" target="_blank"
        >open sourced on GitHub</a
      >
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
