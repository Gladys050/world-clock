<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />

    <title>World clock - Gladys Monnapule</title>
  </head>

  <body>
    <div class="containers">
      <h1>World Clock</h1>

      <select class="city-wrapper">
        <option value="">Select a city...</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Auckland</option>
      </select>
    
      <div class="cities-wrapper">
      <div class="city">
        <h2>London</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
      </div>

      <div class="city">
        <h2>Sydney</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
      </div>
        <div class="city">
        <h2>Zimbabwe</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
        </div>
        <div class="city">
        <h2>Kimberley</h2>
        <div class="date">September 17th 2022</div>
        <div class="time">12:00:00 AM</div>
      </div>
      </div>
    <footer>
      This project was created by Gladys Monnapule and is
      <a href="https://github.com/Gladys050/world-clock" target="_blank"
        >open sourced on GitHub</a
      >
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
